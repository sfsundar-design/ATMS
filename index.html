<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ATMS</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f7fb;
color:#222;
}

@media (prefers-color-scheme:dark){

body{
background:#111827;
color:white;
}

.card{
background:#1f2937;
}

.sidebar{
background:#0f172a;
}

}


.header{
padding:15px;
font-size:24px;
font-weight:bold;
background:#2563eb;
color:white;
}


.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
padding:20px;

}


.card{

padding:20px;
border-radius:15px;
background:white;

box-shadow:0 2px 5px rgba(0,0,0,0.1);

}


.quick{

padding:20px;

}


button{

width:100%;
padding:15px;

margin-bottom:10px;

border:none;

border-radius:10px;

background:#2563eb;

color:white;

font-size:16px;

}


.activity{

padding:20px;

}


li{

padding:8px;

}

</style>

</head>

<body>


<div class="header">

ATMS Dashboard

</div>



<div class="grid">

<div class="card">

👥 Customers

<h2>120</h2>

</div>


<div class="card">

📋 Visits

<h2>45</h2>

</div>



<div class="card">

🧪 Trials

<h2>12</h2>

</div>



<div class="card">

📅 Followups

<h2>7</h2>

</div>

</div>



<div class="quick">

<button>New Visit</button>

<button>Customers</button>

<button>Trials</button>

<button>Calendar</button>

<button>Reports</button>

</div>



<div class="activity">

<h3>Recent Activities</h3>

<ul>

<li>SP26001 created</li>

<li>Jayajothi Trial Updated</li>

<li>Complaint closed</li>

<li>Customer Follow-up due</li>

</ul>

</div>



</body>

</html>
